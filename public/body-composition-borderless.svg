<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="120" y1="120" x2="904" y2="904" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#243C5A"/>
      <stop offset="0.55" stop-color="#102843"/>
      <stop offset="1" stop-color="#051A33"/>
    </linearGradient>
    <linearGradient id="cyanGrad" x1="286" y1="324" x2="740" y2="730" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22F0EC"/>
      <stop offset="0.55" stop-color="#24D3F7"/>
      <stop offset="1" stop-color="#1167FF"/>
    </linearGradient>
    <linearGradient id="padGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#E6E6EA"/>
      <stop offset="0.2" stop-color="#F8F8FA"/>
      <stop offset="0.45" stop-color="#D7D8DD"/>
      <stop offset="0.7" stop-color="#F5F5F7"/>
      <stop offset="1" stop-color="#C9CAD0"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1024" height="1024" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#00111f" flood-opacity="0.28"/>
    </filter>
    <filter id="softShadow" x="0" y="0" width="1024" height="1024" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <filter id="glow" x="0" y="0" width="1024" height="1024" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="scaleClip">
      <rect x="18" y="18" width="988" height="988" rx="122"/>
    </clipPath>
  </defs>

  <g filter="url(#shadow)">
    <rect x="18" y="18" width="988" height="988" rx="122" fill="url(#bgGrad)"/>
    <rect x="25" y="25" width="974" height="974" rx="115" stroke="#2D4767" stroke-opacity="0.65" stroke-width="4"/>
    <rect x="36" y="36" width="952" height="952" rx="106" stroke="#0A1930" stroke-opacity="0.9" stroke-width="6"/>
  </g>

  <g filter="url(#softShadow)">
